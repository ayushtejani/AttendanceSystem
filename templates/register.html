<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LJ University - Smart Attendance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
        }

        .main-card {
            border: none;
            border-radius: 25px;
            margin-top: 40px;
            overflow: hidden;
        }

        .header {
            background: #0d6efd;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .form-section {
            padding: 40px;
        }

        .btn-register {
            font-size: 18px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow-lg main-card">

                    <div class="header">

                        <h1>LJ UNIVERSITY</h1>
                        <h4>Smart Attendance System</h4>

                    </div>

                    <div class="form-section">

                        <form action="/register" method="POST" enctype="multipart/form-data">

                            <div class="mb-3">
                                <label class="form-label">Student Name</label>
                                <input type="text" class="form-control" name="name" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Division</label>
                                <input type="text" class="form-control" name="division" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Date Of Birth</label>
                                <input type="date" class="form-control" name="dob" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Student Photo</label>
                                <input type="file" class="form-control" name="photo" required>
                            </div>

                            <button class="btn btn-primary btn-lg w-100 btn-register">
                                Register Student
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
